{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow border-0">
            <div class="card-header bg-white py-3">
                <div class="d-flex align-items-center">
                    <a href="{{ url_for('index') }}" class="text-decoration-none text-muted me-3">
                        <i class="bi bi-arrow-left fs-5"></i>
                    </a>
                    <h4 class="mb-0 text-primary">Add New Task</h4>
                </div>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('add') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Task Title *</label>
                        <input type="text" class="form-control" id="title" name="title" required
                            placeholder="Enter task title">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"
                            placeholder="Task details..."></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="due_date" class="form-label fw-bold">Due Date</label>
                            <input type="date" class="form-control" id="due_date" name="due_date">
                        </div>
                        <div class="col-md-6">
                            <label for="status" class="form-label fw-bold">Status *</label>
                            <select class="form-select" id="status" name="status" required>
                                <option value="Pending" selected>Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="created_by" class="form-label fw-bold">Assigned By (Name / ID)</label>
                            <input type="text" class="form-control" id="created_by" name="created_by"
                                placeholder="e.g. John Doe (ID: 123)">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="remarks" class="form-label fw-bold">Remarks</label>
                        <textarea class="form-control" id="remarks" name="remarks" rows="2"
                            placeholder="Any additional notes..."></textarea>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-save"></i> Save Task
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
